<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VIMIGO for AI Team — 客户启动门户 / Onboarding Portal</title>
<style>
  :root{
    --bg:#f5f6fa; --card:#ffffff; --ink:#15131f; --muted:#6b6880; --line:#e7e6ef;
    --brand:#6d28d9; --brand2:#8b5cf6; --brand-ink:#5b21b6; --accent:#a78bfa;
    --ok:#16a34a; --ok-bg:#ecfdf3; --warn:#b45309; --warn-bg:#fff7ed;
    --info-bg:#f3effe; --chip:#f2f0fb; --code:#1a1430; --code-ink:#e9e3ff;
    --shadow:0 12px 34px rgba(60,40,120,.10);
  }
  html[data-theme="dark"]{
    --bg:#0c0a17; --card:#16122a; --ink:#ece9f8; --muted:#a59fc2; --line:#2a2444;
    --brand:#8b5cf6; --brand2:#a78bfa; --brand-ink:#c4b5fd; --accent:#a78bfa;
    --ok:#34d399; --ok-bg:#0c2a20; --warn:#fbbf24; --warn-bg:#2a1f08;
    --info-bg:#1c1638; --chip:#211a3c; --code:#0a0717; --code-ink:#e9e3ff;
    --shadow:0 14px 34px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:var(--brand-ink)}
  .hidden{display:none !important}

  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, rgba(139,92,246,.18), transparent), var(--bg);position:relative}
  #gate .toplang{position:absolute;top:20px;right:20px}
  .gate-card{width:min(440px,100%);background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:34px 30px;text-align:center}
  .gate-card .logo{font-size:40px}
  .gate-card h1{font-size:24px;margin:10px 0 4px}
  .gate-card .tag{color:var(--brand-ink);font-weight:700;font-size:14px;margin:0 0 4px}
  .gate-card p{color:var(--muted);font-size:14px;line-height:1.6;margin:0 0 20px}
  .gate-input{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:12px;font-size:16px;text-align:center;letter-spacing:.12em;background:var(--bg);color:var(--ink);margin-bottom:12px}
  .gate-input:focus{outline:none;border-color:var(--brand)}
  .gate-btn{width:100%;background:var(--brand);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer}
  .gate-btn:hover{background:var(--brand-ink)}
  .gate-err{color:#dc2626;font-size:13px;margin-top:10px;min-height:18px}
  .gate-hint{font-size:11px;color:var(--muted);margin-top:14px}

  header.bar{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:1px solid var(--line)}
  .bar-in{display:flex;align-items:center;gap:14px;padding:11px 18px}
  .hamb{display:none;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:6px 10px;cursor:pointer;font-size:16px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;white-space:nowrap}
  .brand .logo{font-size:20px}
  .brand small{display:block;font-weight:600;font-size:10.5px;color:var(--muted);letter-spacing:.02em}
  .progress-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:0;max-width:420px}
  .progress-text{font-size:12.5px;color:var(--muted);white-space:nowrap}
  .progress-bar{flex:1;height:6px;background:var(--chip);border-radius:99px;overflow:hidden;min-width:50px}
  .progress-bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .35s}
  .controls{display:flex;align-items:center;gap:8px;margin-left:auto}
  .pill{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:99px;padding:6px 12px;font-size:13px;cursor:pointer}
  .pill b{color:var(--brand-ink)}
  .pill:hover{border-color:var(--brand)}

  .layout{display:grid;grid-template-columns:248px 1fr;align-items:start}
  aside.nav{position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;border-right:1px solid var(--line);background:var(--card);padding:16px 12px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:600;margin-bottom:2px}
  .nav-item:hover{background:var(--chip)}
  .nav-item.active{background:color-mix(in srgb,var(--brand) 14%,transparent);color:var(--brand-ink)}
  .nav-num{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto;color:var(--muted);background:var(--card)}
  .nav-item.active .nav-num{border-color:var(--brand);color:var(--brand-ink)}
  .nav-item.done .nav-num{background:var(--ok);border-color:var(--ok);color:#fff}
  .nav-lbl{line-height:1.2}
  .scrim{display:none}

  main{padding:30px 30px 90px;max-width:860px}
  .eyebrow{color:var(--brand-ink);font-weight:800;font-size:12px;letter-spacing:.08em;margin-bottom:8px;text-transform:uppercase}
  h2.title{font-size:30px;margin:0 0 10px;display:flex;align-items:center;gap:10px}
  h2.title .ic{font-size:28px}
  .lead{color:var(--muted);font-size:16px;line-height:1.7;margin:0 0 22px}
  h3.sub{font-size:18px;margin:26px 0 10px}
  p.body{line-height:1.7;margin:0 0 14px}
  .muted{color:var(--muted)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:20px 22px;margin:0 0 16px}

  .hero{display:grid;grid-template-columns:1fr 320px;gap:22px;align-items:start}
  .hero .pitch h1{font-size:34px;line-height:1.15;margin:6px 0 8px}
  .hero .pitch .slogan{font-size:17px;color:var(--brand-ink);font-weight:700;margin:0 0 14px}
  .readiness{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 18px}
  .readiness h4{margin:0 0 14px;font-size:14px;letter-spacing:.04em}
  .ready-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .ready-item:last-child{border-bottom:none}
  .ready-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
  .ready-item.on .ready-box{background:var(--ok);border-color:var(--ok)}
  .ready-item.on{color:var(--ink)}

  .grid4{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .pill-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px}
  .pill-card .n{display:inline-flex;width:30px;height:30px;border-radius:9px;background:color-mix(in srgb,var(--brand) 14%,transparent);color:var(--brand-ink);font-weight:800;align-items:center;justify-content:center;margin-bottom:10px}
  .pill-card h4{margin:0 0 6px;font-size:16px}
  .pill-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.6}

  .chk{display:flex;align-items:flex-start;gap:11px;padding:10px 0;cursor:pointer;line-height:1.55}
  .chk .b{width:21px;height:21px;border-radius:6px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;margin-top:1px}
  .chk.on .b{background:var(--brand);border-color:var(--brand)}
  .chk.on span{color:var(--muted);text-decoration:line-through}

  .day{border:1px solid var(--line);border-radius:14px;padding:18px;margin:0 0 14px;background:var(--card)}
  .day .dh{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .day .dn{background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;font-weight:800;font-size:12px;padding:4px 10px;border-radius:99px}
  .day h4{margin:0;font-size:17px}
  .day .goal{color:var(--muted);font-size:14px;margin:0 0 10px}
  .day .ol{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--brand-ink);margin:0 0 6px}
  .day ul{margin:0;padding-left:18px;line-height:1.7;font-size:14px}

  .rule{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .rule:last-child{border-bottom:none}
  .rule .rn{font-size:22px;font-weight:800;color:var(--accent);flex:0 0 auto;width:34px}
  .rule h4{margin:0 0 4px;font-size:16px}
  .rule p{margin:0;color:var(--muted);font-size:14px;line-height:1.6}

  .tool-col h4{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:8px}
  .tool-col .tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}
  .tag.req{background:var(--warn-bg);color:var(--warn)}
  .tag.rec{background:var(--info-bg);color:var(--brand-ink)}
  .tag.opt{background:var(--chip);color:var(--muted)}
  .tool-col ul{margin:0;padding-left:18px;line-height:1.9;font-size:14px}

  .sgh{display:flex;align-items:center;margin:0 0 8px}
  .sgh h4{margin:0;font-size:16px}
  .sgn{display:inline-flex;width:26px;height:26px;border-radius:8px;background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;font-weight:800;font-size:13px;align-items:center;justify-content:center;margin-right:9px;flex:0 0 auto}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 2px}
  .chip{background:var(--chip);border:1px solid var(--line);border-radius:99px;padding:4px 11px;font-size:12.5px;font-weight:600}
  ul.uses{margin:6px 0 0;padding-left:18px;line-height:1.7;font-size:13.5px;color:var(--muted)}
  .tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}

  .formph{border:1.5px dashed color-mix(in srgb,var(--brand) 45%,transparent);border-radius:16px;padding:20px;background:color-mix(in srgb,var(--brand) 5%,transparent);margin:0 0 16px}
  .formph .ttl{font-weight:800;font-size:16px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .formph .ds{color:var(--muted);font-size:13.5px;margin:0 0 14px;line-height:1.6}
  .field{margin:0 0 10px}
  .field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:var(--ink)}
  .field .inp{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--muted);font-size:13.5px}
  .formph .note{font-size:11.5px;color:var(--warn);margin-top:6px}
  .form-cta{display:inline-block;background:var(--brand);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:14px;margin-top:6px;cursor:pointer;text-decoration:none}

  table.t{width:100%;border-collapse:collapse;font-size:13.5px;margin:0 0 12px;overflow:hidden;border-radius:12px;border:1px solid var(--line)}
  table.t th{background:var(--chip);text-align:left;padding:10px 12px;font-size:12px;letter-spacing:.03em;color:var(--muted)}
  table.t td{padding:10px 12px;border-top:1px solid var(--line);line-height:1.5}

  .acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:0 0 10px;background:var(--card)}
  .acc>summary{cursor:pointer;list-style:none;padding:14px 16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary::after{content:"+";color:var(--muted);font-size:18px}
  .acc[open]>summary::after{content:"\2013"}
  .acc .ab{padding:0 16px 16px;font-size:14px;line-height:1.65;color:var(--muted)}

  .tip{background:var(--info-bg);border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);border-radius:12px;padding:12px 14px;margin:0 0 14px;font-size:14px;line-height:1.6;display:flex;gap:8px}
  .tip .i{color:var(--brand-ink);font-weight:800;flex:0 0 auto}
  .btn-link{display:inline-flex;align-items:center;gap:6px;background:var(--brand);color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;margin-top:4px}
  .btn-link:hover{background:var(--brand-ink)}

  .cta{width:100%;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:18px;background:var(--brand);color:#fff}
  .cta:hover{background:var(--brand-ink)}
  .cta.done{background:var(--ok)}
  .navrow{display:flex;justify-content:space-between;margin-top:14px;font-size:13px}
  .navrow a{cursor:pointer;color:var(--muted);text-decoration:none}
  .navrow a:hover{color:var(--ink)}
  footer.foot{grid-column:1 / -1;text-align:center;color:var(--muted);font-size:13px;padding:20px;border-top:1px solid var(--line)}
  .editnote{background:var(--warn-bg);border:1px dashed color-mix(in srgb,var(--warn) 45%,transparent);color:var(--warn);border-radius:12px;padding:10px 14px;font-size:12px;margin:22px 0 0}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr}
    .hamb{display:block}
    aside.nav{position:fixed;top:0;left:0;height:100vh;width:260px;z-index:50;transform:translateX(-100%);transition:transform .25s;padding-top:18px}
    aside.nav.open{transform:translateX(0)}
    .scrim.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
    .hero{grid-template-columns:1fr}
    .grid4{grid-template-columns:1fr}
    main{padding:24px 18px 80px}
  }
</style>
</head>
<body>

<section id="gate">
  <div class="toplang"><button class="pill" id="gateLang">🌐 中文 · EN</button></div>
  <div class="gate-card">
    <div class="logo">🚀</div>
    <div class="tag" id="gTag">VIMIGO for AI Team</div>
    <h1 id="gTitle">客户启动门户</h1>
    <p id="gSub">请输入你的专属课程通行码进入。<br>通行码已随报名确认一起发送给你。</p>
    <input class="gate-input" id="gateCode" placeholder="ACCESS CODE" autocomplete="off" />
    <button class="gate-btn" id="gateBtn">进入门户</button>
    <div class="gate-err" id="gateErr"></div>
    <div class="gate-hint" id="gHint">如未收到通行码，请向管理员索取。</div>
  </div>
</section>

<div id="app" class="hidden">
  <header class="bar">
    <div class="bar-in">
      <button class="hamb" id="hamb">☰</button>
      <div class="brand"><span class="logo">🚀</span><span>VIMIGO<small id="brandSub">for AI Team · 启动门户</small></span></div>
      <div class="progress-wrap">
        <span class="progress-text" id="progText">0/10</span>
        <div class="progress-bar"><i id="progFill"></i></div>
      </div>
      <div class="controls">
        <button class="pill" id="themeBtn">🌙</button>
        <button class="pill" id="langBtn">🌐 中文 · EN</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="scrim" id="scrim"></div>
    <aside class="nav" id="navSidebar"></aside>
    <main>
      <div id="content"></div>
      <div class="editnote" id="editNote"></div>
    </main>
    <footer class="foot" id="foot"></footer>
  </div>
</div>

<script>
const ACCESS_CODE = "vimigoAI2026";

const T = {
  zh:{ brandSub:"for AI Team · 启动门户", complete:"此部分我明白了",
    completed:"已完成 ✓", prev:"← 上一部分", next:"下一部分 →", of:"/",
    enter:"进入门户", footer:'VIMIGO for AI Team · 需要协助？<a href="#">WhatsApp 联系管理员</a>',
    editNote:"⚠️ 这是 Phase 1 结构占位门户。文字与表单均为占位，请替换为真实内容。表单可后续嵌入 Airtable / Tally 链接。",
    whatToDo:"操作步骤 What to do", verify:"验证是否成功" },
  en:{ brandSub:"for AI Team · Portal", complete:"I understand this section",
    completed:"Completed ✓", prev:"← Previous", next:"Next →", of:"/",
    enter:"Enter Portal", footer:'VIMIGO for AI Team · Need help? <a href="#">Message admin on WhatsApp</a>',
    editNote:"⚠️ Phase 1 placeholder portal. Copy and forms are placeholders — replace with real content. Form blocks can embed an Airtable / Tally link.",
    whatToDo:"What to do", verify:"Verify it works" }
};
const t = () => T[state.lang];
function L(o){ return o ? (o[state.lang] ?? o.zh ?? o.en ?? "") : ""; }
function langPill(){ return state.lang==="zh" ? '🌐 <b>中文</b> · EN' : '🌐 中文 · <b>EN</b>'; }

const SECTIONS = [
{ id:"start", icon:"👋", nav:{zh:"开始这里",en:"Start Here"},
  title:{zh:"欢迎加入 VIMIGO for AI Team",en:"Welcome to VIMIGO for AI Team"},
  blocks:[
    {type:"hero"},
    {type:"p", x:{zh:"📅 课程日期：2026 年 7 月 8–11 日（共 4 天）　｜　🕙 时间：每天 10am–7pm　｜　📍 地点：Avengers Incubator, 吉隆坡 (KL)",
                  en:"📅 Dates: 8–11 July 2026 (4 days)　|　🕙 Time: 10am–7pm daily　|　📍 Venue: Avengers Incubator, KL"}},
    {type:"h3", x:{zh:"开班前，请完成这 5 件事",en:"Before class, complete these 5 things"}},
    {type:"p", x:{zh:"【占位】这个门户会带你完成所有课前准备，让你一进教室就能为公司搭建真正可用的 AI 工作流，而不是从零摸索工具。",
                  en:"[Placeholder] This portal walks you through all pre-work so that on Day 1 you build real, usable AI workflows for your company — not fumble with tools from scratch."}},
    {type:"tip", x:{zh:"建议预留 20–30 分钟完成全部课前准备。越认真准备，课堂产出越大。AI 工具的安装会在课程第一节课一起完成，无需提前安装。",
                    en:"Set aside 20–30 minutes for pre-work. The more real prep you bring, the more you build in class. Tool installation is done together in class — no need to install in advance."}}
  ]},

{ id:"overview", icon:"🧭", nav:{zh:"课程总览",en:"Program Overview"},
  title:{zh:"这是什么课程",en:"What This Program Is"},
  blocks:[
    {type:"lead", x:{zh:"不是学 AI 工具，而是打造你公司的 AI Team。",en:"Not just learning AI tools — building your company's AI Team."}},
    {type:"p", x:{zh:"【占位】这是一门面向企业老板与核心团队的实战课程。目标不是教完每一个 AI 工具，而是帮你的公司学会如何设计 AI 工作流、AI Agent，以及人与 AI 协作的团队结构，真正提升业务执行力。",
                  en:"[Placeholder] A hands-on program for business owners and key team members. The goal isn't to teach every AI tool, but to help your company design AI workflows, AI agents, and a human + AI team structure that improves real execution."}},
    {type:"h3", x:{zh:"你会学到的四大支柱",en:"The 4 Pillars You'll Learn"}},
    {type:"pillars", items:[
      {n:1,h:{zh:"AI Mindset",en:"AI Mindset"},d:{zh:"理解 AI 如何改变工作方式。",en:"Understand how AI changes the way work happens."}},
      {n:2,h:{zh:"AI Workflow",en:"AI Workflow"},d:{zh:"把每天的手动工作变成可复用的工作流。",en:"Turn daily manual work into repeatable workflows."}},
      {n:3,h:{zh:"AI Agent",en:"AI Agent"},d:{zh:"为具体部门打造 AI 助手。",en:"Build AI assistants for specific departments."}},
      {n:4,h:{zh:"AI Team OS",en:"AI Team OS"},d:{zh:"设计人与 AI 团队如何协同运作。",en:"Design how the human team and AI team work together."}}
    ]},
    {type:"tip", x:{zh:"【占位】好的 AI 实战强调规划、测试、复查与安全思维 —— 不是“快速生成就好”。",
                    en:"[Placeholder] Good AI work emphasizes planning, testing, review and security thinking — not just 'generate fast'."}}
  ]},

{ id:"checklist", icon:"✅", nav:{zh:"课前清单",en:"Before-Class Checklist"},
  title:{zh:"课前准备清单",en:"Before-Class Checklist"},
  blocks:[
    {type:"lead", x:{zh:"这是最重要的一页。请逐项勾选确认。",en:"The most important page. Check each item off."}},
    {type:"h3", x:{zh:"个人准备",en:"Personal Preparation"}},
    {type:"check", items:[
      {zh:"笔记本电脑（已充电）",en:"Laptop (charged)"},
      {zh:"充电器",en:"Charger"},
      {zh:"稳定网络 / 手机热点",en:"Stable internet / hotspot"},
      {zh:"Google / Gmail 账号",en:"Google / Gmail account"},
      {zh:"公司邮箱访问权限",en:"Company email access"},
      {zh:"带上真实的公司问题",en:"Bring real company problems"}
    ]},
    {type:"tip", x:{zh:"AI 工具（ChatGPT、Claude、WhatsApp Web 等）的账号与安装会在课程第一节课由导师带着一起完成，无需提前安装，避免设置出错。",

function renderGate(){
  const zh=state.lang==="zh";
  $("#gTitle").textContent = zh?"客户启动门户":"Customer Onboarding Portal";
  $("#gSub").innerHTML = zh?"请输入你的专属课程通行码进入。<br>通行码已随报名确认一起发送给你。"
    :"Enter your private class access code.<br>It was sent with your registration confirmation.";
  $("#gateBtn").textContent = zh?"进入门户":"Enter Portal";
  $("#gateLang").innerHTML = langPill();
  $("#gHint").textContent = zh?"如未收到通行码，请向管理员索取。":"Didn't get a code? Ask your admin.";
}
$("#gateLang").onclick=()=>{ state.lang=state.lang==="zh"?"en":"zh"; save(); renderGate(); };
function tryUnlock(){
  const v=$("#gateCode").value.trim().toUpperCase();
  if(v===ACCESS_CODE.toUpperCase()){ state.unlocked=true; save(); startApp(); }
  else { $("#gateErr").textContent = state.lang==="zh"?"通行码不正确，请重试。":"Incorrect code, please try again."; }
}
$("#gateBtn").onclick=tryUnlock;
$("#gateCode").addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(); });

function applyTheme(){ document.documentElement.setAttribute("data-theme",state.theme); $("#themeBtn").textContent=state.theme==="dark"?"☀️":"🌙"; }
function renderBar(){
  $("#brandSub").textContent=t().brandSub;
  $("#langBtn").innerHTML = langPill();
  const total=SECTIONS.length, d=state.done.length;
  $("#progText").textContent=`${d}/${total}`;
  $("#progFill").style.width=(d/total*100)+"%";
  document.documentElement.lang=state.lang;
}
function renderNav(){
  const nav=$("#navSidebar"); nav.innerHTML="";
  SECTIONS.forEach((s,i)=>{
    const done=state.done.includes(i);
    const el=document.createElement("div");
    el.className="nav-item"+(i===state.current?" active":"")+(done?" done":"");
    el.innerHTML=`<span class="nav-num">${done?"✓":(i+1)}</span><span class="nav-lbl">${L(s.nav)}</span>`;
    el.onclick=()=>{ state.current=i; closeNav(); save(); renderAll(); window.scrollTo({top:0,behavior:"smooth"}); };
    nav.appendChild(el);
  });
}
function closeNav(){ $("#navSidebar").classList.remove("open"); $("#scrim").classList.remove("open"); }
$("#hamb").onclick=()=>{ $("#navSidebar").classList.toggle("open"); $("#scrim").classList.toggle("open"); };
$("#scrim").onclick=closeNav;

function renderBlock(b, si){
  switch(b.type){
    case "hero":{
      let ri="";
      READINESS.forEach(r=>{
        let on;
        if(r.sec==="__all__") on = state.done.length===SECTIONS.length;
        else if(Array.isArray(r.sec)) on = r.sec.every(id=>state.done.includes(SECTIONS.findIndex(x=>x.id===id)));
        else on = state.done.includes(SECTIONS.findIndex(x=>x.id===r.sec));
        ri+=`<div class="ready-item ${on?"on":""}"><span class="ready-box">${on?"✓":""}</span><span>${L(r)}</span></div>`;
      });
      return `<div class="hero"><div class="pitch">
        <div class="eyebrow">VIMIGO for AI Team</div>
        <h1>${state.lang==="zh"?"打造你公司的 AI Team":"Build Your Company's AI Team"}</h1>
        <div class="slogan">${state.lang==="zh"?"不是学 AI 工具，而是打造你公司的 AI Team。":"Not just learn AI tools — build your AI Team."}</div>
        <p class="muted" style="line-height:1.7">${state.lang==="zh"?"在左侧依次完成每一个部分，你的准备进度会自动更新。":"Work through each section in the left nav — your readiness updates automatically."}</p>
        </div>
        <div class="readiness"><h4>${state.lang==="zh"?"我的准备进度":"My Readiness"}</h4>${ri}</div></div>`;
    }
    case "stackgroup":{
      const tierCls=b.tier, tierLbl = state.lang==="zh"
        ? (b.tier==="req"?"必备":b.tier==="rec"?"推荐":"视公司情况使用")
        : (b.tier==="req"?"REQUIRED":b.tier==="rec"?"RECOMMENDED":"AS NEEDED");
      let chips=""; b.tools.forEach(x=>chips+=`<span class="chip">${x}</span>`);
      let uses=""; b.uses.forEach(u=>uses+=`<li>${L(u)}</li>`);
      const note=b.note?`<div class="tip" style="margin-top:10px"><span class="i">⚠️</span><span>${L(b.note)}</span></div>`:"";
      return `<div class="card">
        <div class="sgh"><span class="sgn">${b.n}</span><h4>${L(b.title)}</h4></div>
        <p class="muted" style="margin:0 0 6px;line-height:1.6;font-size:14px">${L(b.desc)}</p>
        <div><span class="tag ${tierCls}">${tierLbl}</span></div>
        <div class="chips">${chips}</div>
        <div class="ol" style="margin-top:10px;font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--brand-ink)">${state.lang==="zh"?"用途 USES":"USES"}</div>
        <ul class="uses">${uses}</ul>${note}
      </div>`;
    }
    case "lead": return `<p class="lead">${L(b.x)}</p>`;
    case "h3":   return `<h3 class="sub">${L(b.x)}</h3>`;
    case "p":    return `<p class="body">${L(b.x)}</p>`;
    case "tip":  return `<div class="tip"><span class="i">ⓘ</span><span>${L(b.x)}</span></div>`;
    case "pillars":{
      let h=`<div class="grid4">`;
      b.items.forEach(p=>{ h+=`<div class="pill-card"><span class="n">${p.n}</span><h4>${L(p.h)}</h4><p>${L(p.d)}</p></div>`; });
      return h+`</div>`;
    }
    case "check":{
      const cs=state.checks[si]||[];
      let h=`<div class="card">`;
      b.items.forEach((it,idx)=>{ const on=cs.includes(idx);
        h+=`<div class="chk ${on?"on":""}" data-chk="${si}" data-idx="${idx}"><span class="b">${on?"✓":""}</span><span>${L(it)}</span></div>`; });
      return h+`</div>`;
    }
    case "days":{
      let h="";
      b.items.forEach(d=>{
        let outs=""; d.outs.forEach(o=>outs+=`<li>${L(o)}</li>`);
        h+=`<div class="day"><div class="dh"><span class="dn">${d.d}</span><h4>${L(d.h)}</h4></div>
          <p class="goal">${L(d.goal)}</p>
          <div class="ol">${state.lang==="zh"?"客户产出":"YOUR OUTPUT"}</div><ul>${outs}</ul></div>`;
      });
      return h;
    }
    case "rules":{
      let h=`<div class="card">`;
      b.items.forEach((r,idx)=>{ h+=`<div class="rule"><div class="rn">${idx+1}</div><div><h4>${L(r.h)}</h4><p>${L(r.d)}</p></div></div>`; });
      return h+`</div>`;
    }
    case "form":{
      let f="";
      b.fields.forEach(fl=>{ const ex=fl.eg?L(fl.eg):(state.lang==="zh"?"（占位输入框）":"(placeholder field)");
        f+=`<div class="field"><label>${L(fl)}</label><div class="inp">${ex}</div></div>`; });
      return `<div class="formph"><div class="ttl">📋 ${L(b.title)}</div><div class="ds">${L(b.desc)}</div>${f}
        <a class="form-cta" href="#">${state.lang==="zh"?"提交 Submit":"Submit"} →</a>
        <div class="note">${state.lang==="zh"?"⚠️ 占位表单 — 上线时在此嵌入 Airtable / Tally 表单链接。":"⚠️ Placeholder — embed an Airtable / Tally form link here when live."}</div></div>`;
    }
    case "table":{
      let th=""; b.headers[state.lang].forEach(x=>th+=`<th>${x}</th>`);
      let tr=""; b.rows.forEach(r=>{ tr+="<tr>"; r[state.lang].forEach(c=>tr+=`<td>${c}</td>`); tr+="</tr>"; });
      return `<table class="t"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
    }
    case "faq":{
      let h=""; b.items.forEach(q=>{ h+=`<details class="acc"><summary>${L(q.q)}</summary><div class="ab">${L(q.a)}</div></details>`; });
      return h;
    }
    case "cta": return `<a class="btn-link" href="${b.url}" target="_blank" rel="noopener">${L(b.label)}</a>`;
    default: return "";
  }
}

function renderContent(){
  const i=state.current, s=SECTIONS[i];
  let h=`<div class="eyebrow">${state.lang==="zh"?"部分":"SECTION"} ${i+1} ${t().of} ${SECTIONS.length}</div>`;
  h+=`<h2 class="title"><span class="ic">${s.icon}</span>${L(s.title)}</h2>`;
  s.blocks.forEach(b=>{ h+=renderBlock(b,i); });
  const done=state.done.includes(i);
  h+=`<button class="cta ${done?"done":""}" id="ctaBtn">${done? t().completed : "✓ "+t().complete}</button>`;
  h+=`<div class="navrow">
      <a data-nav="prev" style="${i===0?"visibility:hidden":""}">${t().prev}</a>
      <a data-nav="next" style="${i===SECTIONS.length-1?"visibility:hidden":""}">${t().next}</a></div>`;
  $("#content").innerHTML=h;
  $("#editNote").textContent=t().editNote;
  bindContent();
}
function bindContent(){
  const i=state.current;
  document.querySelectorAll("[data-chk]").forEach(c=>c.onclick=()=>{
    const si=+c.dataset.chk, idx=+c.dataset.idx;
    const arr=state.checks[si]||(state.checks[si]=[]);
    const p=arr.indexOf(idx); if(p>=0)arr.splice(p,1); else arr.push(idx);
    save(); renderContent();
  });
  document.querySelectorAll("[data-confirm]").forEach(c=>c.onclick=()=>{
    state.confirms=state.confirms||{}; const id=c.dataset.confirm;
    state.confirms[id]=!state.confirms[id]; save(); renderContent();
  });
  const cta=$("#ctaBtn");
  if(cta) cta.onclick=()=>{ if(!state.done.includes(i))state.done.push(i); save();
    if(i<SECTIONS.length-1)state.current=i+1; renderAll(); window.scrollTo({top:0,behavior:"smooth"}); };
  document.querySelectorAll("[data-nav]").forEach(a=>a.onclick=()=>{
    if(a.dataset.nav==="prev"&&i>0)state.current=i-1;
    if(a.dataset.nav==="next"&&i<SECTIONS.length-1)state.current=i+1;
    save(); renderAll(); window.scrollTo({top:0,behavior:"smooth"});
  });
}

function renderFooter(){ $("#foot").innerHTML=t().footer; }
$("#themeBtn").onclick=()=>{ state.theme=state.theme==="dark"?"light":"dark"; save(); applyTheme(); };
$("#langBtn").onclick =()=>{ state.lang=state.lang==="zh"?"en":"zh"; save(); renderAll(); };

function renderAll(){ renderBar(); renderNav(); renderContent(); renderFooter(); }
function startApp(){ $("#gate").classList.add("hidden"); $("#app").classList.remove("hidden"); applyTheme(); renderAll(); }
applyTheme();
if(state.unlocked){ startApp(); } else { renderGate(); }
</script>
</body>
</html>
